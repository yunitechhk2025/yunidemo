<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 解决方案生成器 | YuniTech</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  
  <div class="container">
    <!-- 语言选择器 -->
    <div class="lang-selector">
      <select id="langSelect">
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
      </select>
    </div>

    <header>
      <div class="logo">
        <img src="/logo.png" alt="YuniTech" class="logo-img">
      </div>
      <h1 data-i18n="title">AI 解决方案生成器</h1>
      <p class="subtitle" data-i18n="subtitle">描述您的业务痛点，AI 为您定制专属技术方案</p>
    </header>

    <main class="glass-card">
      <div class="input-section">
        <div class="textarea-wrapper">
          <textarea 
            id="painPointInput" 
            placeholder="例如：我经营一家连锁餐厅，每天排队等位时间长，顾客流失严重，需要一个智能排队和预约系统..."
            rows="4"
          ></textarea>
        </div>
        
        <button id="matchBtn" class="primary-btn">
          <span class="btn-text" data-i18n="generateBtn">生成解决方案</span>
          <span class="btn-icon">→</span>
        </button>
      </div>

      <div id="loading" class="loading" style="display: none;">
        <div class="loader">
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
        </div>
        <p class="loading-text"><span data-i18n="loading">AI 正在分析您的需求</span><span class="dots"></span></p>
      </div>

      <div id="results" class="results-section"></div>
    </main>

    <footer>
      <div class="footer-tags" id="footerTags">
        <span>零售</span><span>餐饮</span><span>物流</span><span>医疗</span><span>教育</span>
        <span>金融</span><span>美容</span><span>酒店</span><span>制造</span><span data-i18n="more">更多</span>
      </div>
      <p class="copyright">Powered by Yuni Tech Limited</p>
    </footer>
  </div>

  <!-- 联系方式弹窗 -->
  <div id="contactModal" class="contact-modal" style="display:none;">
    <div class="contact-modal-backdrop"></div>
    <div class="contact-modal-content">
      <button id="contactCloseBtn" class="contact-close-btn" aria-label="Close">&times;</button>
      <h3 id="contactModalTitle"></h3>
      <p id="contactModalDesc"></p>
      <div class="contact-qr-grid">
        <div class="contact-qr-item">
          <div class="contact-qr-wrapper">
            <img src="/wechat-qr.png" alt="WeChat QR Code" class="contact-qr-img">
          </div>
          <span class="contact-qr-label wechat-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05a6.37 6.37 0 01-.235-1.69c0-3.66 3.376-6.63 7.542-6.63.213 0 .423.012.632.027C16.705 4.907 13.045 2.188 8.691 2.188zm-2.87 4.22a1.1 1.1 0 110 2.199 1.1 1.1 0 010-2.2zm5.742 0a1.1 1.1 0 110 2.199 1.1 1.1 0 010-2.2zm4.247 4.614c-3.728 0-6.758 2.622-6.758 5.852 0 3.23 3.03 5.852 6.758 5.852.686 0 1.35-.1 1.978-.283a.715.715 0 01.592.08l1.47.86a.267.267 0 00.138.045.24.24 0 00.237-.241c0-.059-.023-.117-.039-.174l-.3-1.145a.488.488 0 01.176-.548C20.633 19.851 21.56 18.15 21.56 16.874c0-3.23-3.031-5.852-6.76-5.852zm-2.37 3.375a.907.907 0 110 1.812.907.907 0 010-1.813zm4.74 0a.907.907 0 110 1.812.907.907 0 010-1.813z"/></svg>
            WeChat
          </span>
        </div>
        <div class="contact-qr-item">
          <div class="contact-qr-wrapper">
            <img src="/whatsapp-qr.png" alt="WhatsApp QR Code" class="contact-qr-img">
          </div>
          <span class="contact-qr-label whatsapp-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp
          </span>
        </div>
      </div>
      <div class="contact-modal-actions">
        <button id="contactConfirmBtn" class="primary-btn contact-confirm-btn"></button>
        <button id="contactSkipBtn" class="contact-skip-btn"></button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
