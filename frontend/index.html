<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 解决方案生成器 | YuniTech</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  
  <div class="container">
    <!-- 语言选择器 -->
    <div class="lang-selector">
      <select id="langSelect">
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
      </select>
    </div>

    <header>
      <div class="logo">
        <img src="/logo.png" alt="YuniTech" class="logo-img">
      </div>
      <h1 data-i18n="title">AI 解决方案生成器</h1>
      <p class="subtitle" data-i18n="subtitle">描述您的业务痛点，AI 为您定制专属技术方案</p>
    </header>

    <main class="glass-card">
      <div class="input-section">
        <div class="model-selector">
          <div class="selector-label">
            <span class="icon">⚡</span>
            <span data-i18n="modelLabel">AI 模型</span>
          </div>
          <div class="select-wrapper">
            <select id="modelSelect">
              <option value="gpt-3.5-turbo" data-i18n-option="model1">GPT-3.5 Turbo · 快速</option>
              <option value="gpt-4.1-mini" data-i18n-option="model2">GPT-4.1 Mini · 精准</option>
              <option value="gpt-4o-mini" data-i18n-option="model3">GPT-4o Mini · 均衡</option>
            </select>
            <span class="select-arrow">▾</span>
          </div>
        </div>
        
        <div class="textarea-wrapper">
          <textarea 
            id="painPointInput" 
            data-i18n-placeholder="placeholder"
            placeholder="例如：我经营一家连锁餐厅，每天排队等位时间长，顾客流失严重，需要一个智能排队和预约系统..."
            rows="4"
          ></textarea>
          <button type="button" id="voiceBtn" class="voice-btn" title="语音输入">
            <svg class="mic-icon" viewBox="0 0 24 24" width="24" height="24">
              <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
              <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
            <span class="voice-status"></span>
          </button>
          <div class="textarea-glow"></div>
        </div>
        
        <button id="matchBtn" class="primary-btn">
          <span class="btn-text" data-i18n="generateBtn">生成解决方案</span>
          <span class="btn-icon">→</span>
        </button>
      </div>

      <div id="loading" class="loading" style="display: none;">
        <div class="loader">
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
        </div>
        <p class="loading-text"><span data-i18n="loading">AI 正在分析您的需求</span><span class="dots"></span></p>
      </div>

      <div id="results" class="results-section"></div>
    </main>

    <footer>
      <div class="footer-tags" id="footerTags">
        <span>零售</span><span>餐饮</span><span>物流</span><span>医疗</span><span>教育</span>
        <span>金融</span><span>美容</span><span>酒店</span><span>制造</span><span data-i18n="more">更多</span>
      </div>
      <p class="copyright">Powered by Yuni Tech Limited</p>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
